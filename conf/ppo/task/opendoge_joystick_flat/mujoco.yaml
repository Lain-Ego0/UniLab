# @package _global_
training:
  task_name: OpenDogeJoystickFlat
  sim_backend: mujoco
algo:
  num_envs: 1024
  max_iterations: 500
  empirical_normalization: true
  obs_groups:
    actor:
      - actor
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 1.0e-3
env:
  commands:
    vel_limit:
      - [-0.6, -0.4, -0.8]
      - [1.0, 0.4, 0.8]
reward:
  scales:
    tracking_lin_vel: 1.5
    tracking_ang_vel: 0.2
    lin_vel_z: -5.0
    ang_vel_xy: -0.5
    base_height: -200.0
    action_rate: -0.02
    similar_to_default: -0.03
    contact: 0.24
    swing_feet_z: 4.0
  tracking_sigma: 0.25
  base_height_target: 0.15
