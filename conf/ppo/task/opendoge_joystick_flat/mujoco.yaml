# @package _global_
training:
  task_name: OpenDogeJoystickFlat
  sim_backend: mujoco
algo:
  num_envs: 1024
  max_iterations: 1000
  empirical_normalization: true
  obs_groups:
    actor:
      - actor
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 3.0e-3
env:
  commands:
    rel_standing_envs: 0.1
    vel_limit:
      - [-0.6, -0.6, -1.5]
      - [1.0, 0.6, 1.5]
reward:
  scales:
    tracking_lin_vel: 1.5
    tracking_ang_vel: 0.3
    tracking_vy: 1.0
    lin_vel_z: -5.0
    ang_vel_xy: -0.5
    base_height: -200.0
    action_rate: -0.008
    action_smooth: -0.003
    similar_to_default: -0.03
    dof_acc: -0.0000005
    stand_still: -0.2
    torques: -0.005
    energy: -0.0001
    contact: 0.24
    swing_feet_z: 5.0
  tracking_sigma: 0.25
  base_height_target: 0.15
